<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BMI Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-900 text-white min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm px-5 py-6">
    <div class="bg-neutral-800 rounded-2xl shadow-lg p-5 space-y-5">
      <div class="text-center space-y-1">
        <h1 class="text-lg font-semibold">BMI Calculator</h1>
        <p class="text-neutral-400 text-sm">Find your Body Mass Index</p>
      </div>
      <div class="space-y-4">
        <div class="flex items-center justify-between">
          <span class="text-neutral-300">Weight</span>
          <div class="flex items-center gap-2">
            <div class="text-right">
              <span class="text-neutral-400 text-sm mr-1" id="weightUnitLabel">kg</span>
              <span id="weightDisplay" class="text-xl font-semibold tracking-wide">0.0</span>
            </div>
            <div class="flex overflow-hidden rounded-lg bg-neutral-700">
              <button id="kgBtn" class="px-2 py-1 text-sm bg-neutral-600">kg</button>
              <button id="lbBtn" class="px-2 py-1 text-sm hover:bg-neutral-600">lb</button>
            </div>
          </div>
        </div>
        <div class="flex items-center justify-between">
          <span class="text-neutral-300">Height</span>
          <div class="flex items-center gap-2">
            <div class="text-right">
              <span class="text-neutral-400 text-sm mr-1" id="heightUnitLabel">cm</span>
              <span id="heightDisplay" class="text-xl font-semibold tracking-wide">0.0</span>
            </div>
            <div class="flex overflow-hidden rounded-lg bg-neutral-700">
              <button id="cmBtn" class="px-2 py-1 text-sm bg-neutral-600">cm</button>
              <button id="inBtn" class="px-2 py-1 text-sm hover:bg-neutral-600">in</button>
            </div>
          </div>
        </div>
        <div class="flex items-center justify-between bg-neutral-700 rounded-xl p-3">
          <div class="flex items-center gap-2">
            <span class="text-neutral-300">BMI</span>
            <span id="bmiBadge" class="badge bg-neutral-600">—</span>
          </div>
          <div class="text-right">
            <span id="bmiValue" class="text-xl font-semibold tracking-wide">0.0</span>
          </div>
        </div>
      </div>
      <div class="grid grid-cols-3 gap-3 no-select">
        <button class="key rounded-xl bg-neutral-700 hover:bg-neutral-600 p-4 text-center text-lg font-medium" data-key="7">7</button>
        <button class="key rounded-xl bg-neutral-700 hover:bg-neutral-600 p-4 text-center text-lg font-medium" data-key="8">8</button>
        <button class="key rounded-xl bg-neutral-700 hover:bg-neutral-600 p-4 text-center text-lg font-medium" data-key="9">9</button>
        <button class="key rounded-xl bg-neutral-700 hover:bg-neutral-600 p-4 text-center text-lg font-medium" data-key="4">4</button>
        <button class="key rounded-xl bg-neutral-700 hover:bg-neutral-600 p-4 text-center text-lg font-medium" data-key="5">5</button>
        <button class="key rounded-xl bg-neutral-700 hover:bg-neutral-600 p-4 text-center text-lg font-medium" data-key="6">6</button>
        <button class="key rounded-xl bg-neutral-700 hover:bg-neutral-600 p-4 text-center text-lg font-medium" data-key="1">1</button>
        <button class="key rounded-xl bg-neutral-700 hover:bg-neutral-600 p-4 text-center text-lg font-medium" data-key="2">2</button>
        <button class="key rounded-xl bg-neutral-700 hover:bg-neutral-600 p-4 text-center text-lg font-medium" data-key="3">3</button>
        <button class="key rounded-xl bg-neutral-700 hover:bg-neutral-600 p-4 text-center text-lg font-medium" data-key="0">0</button>
        <button class="key rounded-xl bg-neutral-700 hover:bg-neutral-600 p-4 text-center text-lg font-medium" data-key=".">.</button>
        <button id="keyBack" class="rounded-xl bg-neutral-700 hover:bg-neutral-600 p-4 text-center text-lg font-medium">⌫</button>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <button id="targetWeight" class="rounded-xl bg-neutral-700 hover:bg-neutral-600 p-3 font-medium">Weight</button>
        <button id="targetHeight" class="rounded-xl bg-neutral-700 hover:bg-neutral-600 p-3 font-medium">Height</button>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <button id="clearAll" class="rounded-xl bg-neutral-700 hover:bg-neutral-600 p-3 font-medium">Clear</button>
        <button id="calculate" class="rounded-xl bg-emerald-600 hover:bg-emerald-500 p-3 font-semibold">Calculate</button>
      </div>
    </div>
  </div>
  <script src="index.js"></script>
</body>
</html>
