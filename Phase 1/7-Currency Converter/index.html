<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>currency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
    href="https://cdn.jsdelivr.net/npm/remixicon@4.7.0/fonts/remixicon.css"
    rel="stylesheet"
/>
</head>
<body class="flex items-center justify-center bg-[url('https://media.istockphoto.com/id/483424683/photo/euro-and-dollar-symbol-eur-usd-pair.jpg?s=612x612&w=0&k=20&c=sxpJ59whk1IQbv2O22UE0zYEmZ9zZA76-iJBsrsAa_I=')] bg-cover bg-no-repeat h-screen w-screen ">
    <div class="backdrop-blur-2xl h-1/3 w-1/3 rounded-3xl justify-center items-center flex">
        <div>
            <h1 class="text-2xl">Currency Converter</h1>
            <div id="exchange" class="">
                <div class="mb-4 mt-2">
                    <p id="first" class="">1 dhs equals</p>
                    <p id="sec">17.39 pakistani rs </p>
                </div>
                <div id="inputs" class="">
                    <input id="in-1" type="text" placeholder="AED"
                    class="bg-transparent h-8 w-auto"
                    >
                    <i class="ri-arrow-left-right-fill"></i>
                    <input id="in-2" type="text" placeholder="PK"
                    class="bg-transparent h-8 w-auto  placeholder-black"
                    >
                </div>
                <button id="btn-sub" class="bg-blue-300 hover:bg-blue-600 h-8 w-16 rounded-lg ml-32 mt-5">Result</button>
        </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
