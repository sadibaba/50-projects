<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Gen..</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class=" flex items-center justify-center bg-[url('https://images.unsplash.com/vector-1761633623749-8c7ca036aa36?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D')] h-screen w-screen bg-cover">

    <div class=" flex iteam-center justify-center h-1/3 w-1/3 backdrop-blur-2xl shadow-2xl rounded-2xl ">
        <div class="flex flex-col items-center justify-center w-full h-full px-8">
            <blockquote class="text-white text-2xl font-semibold text-center mb-4">
                <p id="quote">"The only way to do great work is to love what you do."</p>
            </blockquote>
            <p class="text-white text-lg mb-6">
                <span id="author">— Steve Jobs</span>
            </p>
            <button class="btn bg-white text-black px-6 py-2 rounded-lg font-semibold hover:bg-gray-200 transition">
                New Quote
            </button>
    </div>

    <script src="index.js"></script>
</body>
</html>
