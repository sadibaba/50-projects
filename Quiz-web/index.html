<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz-web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.7.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body
    class="flex item-center justify-center bg-[url('./img/bg.jpg')] h-screen w-screen bg-cover bg-center"
  >
  <div
  class="flex item-center justify-center h-[60%] w-1/2 backdrop-blur-lg rounded-2xl mt-32"
  >
  <div class="item-center justify-center">
    <div class="ml-44">
        <h1 class="text-3xl font-bold text-gray-700">video-Games Quiz</h1>
    </div>
        <p class="Question bg-transparent w-full text-4xl wrap-break-word text-white">
        Which game features the character Link?
        </p>
        <div class="h-0.5 w-full mt-8 bg-gray-400"></div>
        <div class="options grid grid-cols-2 gap-4 mt-3 text-3xl w-full">
          <button
            class="option1 bg-white/10 hover:bg-white/20 text-white py-2 px-4 rounded-xl"
          >
            Option 1
          </button>
          <button
            class="option2 bg-white/10 hover:bg-white/20 text-white py-2 px-4 rounded-xl"
          >
            Option 2
          </button>
          <button
            class="option3 bg-white/10 hover:bg-white/20 text-white py-2 px-4 rounded-xl"
          >
            Option 3
          </button>
          <button
            class="option4 bg-white/10 hover:bg-white/20 text-white py-2 px-4 rounded-xl"
          >
            Option 4
          </button>
        </div>
        <h1 class="text-gray-400 ml-80 mt-6 text-4xl">0</h1>
      </div>
    </div>
  </body>
</html>
